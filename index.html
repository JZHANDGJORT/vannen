<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vännen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <!-- CSS -->

<body>


<main id="app">


    <!-- STARTSIDA -->

    <section id="home-view">


        <section id="friend-intro">

            <h1>Vännen</h1>

            <p>
                Små vänner som finns där för dig,
                på sitt eget sätt.
            </p>

        </section>


        <section id="friends" class="projects">

            <h2>Våra vänner</h2>


            <div id="friends-list" class="project-grid">

                <!-- Vänkort skapas av friends.js -->

            </div>


        </section>


    </section>


 <!-- VÄNSIDA -->

<section id="friend-view" style="display:none;">

<div class="top-buttons">

   <button id="about-button">
    Om oss ♡
</button>

</div>

<!-- Vännens profil -->

<header id="friend-profile">

    <img id="friend-image" src="" alt="">

    <div id="friend-overlay">

        <h1 id="friend-name"></h1>

        <div class="friend-divider">
            ─── ♡ ───
        </div>

        <p id="friend-subtitle"></p>

    </div>

    <img
    id="backpack"
    src="images/Otis/otis-backpack.PNG"
    alt="Otis ryggsäck">
    
</header>

        <!-- Valbara handlingar -->
    <nav id="actions">

        <!-- Skapas av ui.js -->

    </nav>

<!-- Samtal -->

<section id="chat">

    <div id="messages"></div>

</section>


</section>
      

</main>



<!-- DATA -->


<script src="data/themes.js"></script>



<!-- Vänner -->

<script src="data/friends/otis.js"></script>

<!-- FUNKTIONER -->

<script src="js/friends.js"></script>

<script src="js/app.js"></script>
