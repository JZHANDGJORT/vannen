<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vännen</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/themes.css">
</head>

<body>

    <main id="app">

        <!-- Vännens profil -->
        <header id="friend-profile">
            <img id="friend-image" src="" alt="">
            <h1 id="friend-name"></h1>
        </header>


        <!-- Samtal -->
        <section id="chat">
            <div id="messages"></div>
        </section>


        <!-- Valbara handlingar -->
        <nav id="actions">
            <!-- Knappar skapas automatiskt av ui.js -->
        </nav>

    </main>


    <!-- DATA -->

    <!-- Världar och färgteman -->
    <script src="data/themes.js"></script>

    <!-- Vänner -->
    <script src="data/friends/otis.js"></script>

    <!-- Meddelanden -->
    <script src="data/messages/greetings.js"></script>
    <script src="data/messages/dialogs.js"></script>
    <script src="data/messages/activities.js"></script>
    <script src="data/messages/stories.js"></script>


    <!-- FUNKTIONER -->

    <!-- Sparar historik och användarens val -->
    <script src="js/storage.js"></script>

    <!-- Hanterar chatten -->
    <script src="js/chat.js"></script>

    <!-- Skapar knappar och visuella element -->
    <script src="js/ui.js"></script>

    <!-- Startar hela sidan -->
    <script src="js/app.js"></script>

</body>
</html>
