<html lang="sv">

<head>

    <meta charset="UTF-8">

    <title>Vännen</title>


    <!-- CSS -->

<link rel="stylesheet" href="css/style.css">

<main id="app">



    <!-- STARTSIDA -->

    <section id="home-view">


        <section id="friend-intro">

            <h1>Vännen</h1>

            <p>
                Små vänner som finns där för dig,
                på sitt eget sätt.
            </p>

        </section>



        <section id="friends" class="projects">

            <h2>Våra vänner</h2>

                <!-- Vänkort skapas av friends.js -->

            </div>


        </section>


    </section>






    <!-- VÄNSIDA -->

    <section id="friend-view" style="display:none;">


    <!-- Vännens profil -->

    <header id="friend-profile">

        <img id="friend-image" src="" alt="">

        <h1 id="friend-name"></h1>

    </header>





        <!-- Samtal -->

        <section id="chat">

            <div id="messages"></div>

        </section>





        <!-- Valbara handlingar -->

        <nav id="actions">

            <!-- Skapas av ui.js -->

        </nav>



    </section>
