<!DOCTYPE html>
<html lang="sv">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vännen</title>


    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/themes.css">


</head>


<body>


<main id="app">


    <!-- Presentation av Vännen -->

    <section id="friend-intro">

        <h1>Vännen</h1>

        <p>
            Små vänner som finns där för dig,
            på sitt eget sätt.
        </p>

    </section>



    <!-- Vänner -->

    <section id="friends" class="projects">

        <h2>Våra vänner</h2>


        <div id="friends-list" class="project-grid">

            <!-- Vänkort skapas automatiskt -->

        </div>


    </section>





    <!-- Samtal -->

    <section id="chat">

        <div id="messages"></div>

    </section>





    <!-- Valbara handlingar -->

    <nav id="actions">

        <!-- Knappar skapas automatiskt av ui.js -->

    </nav>




</main>





<!-- DATA -->


<!-- Världar och färgteman -->

<script src="data/themes.js"></script>



<!-- Vänner -->

<script src="data/friends/otis.js"></script>



<!-- Meddelanden -->

<script src="data/messages/greetings.js"></script>

<script src="data/messages/dialogs.js"></script>

<script src="data/messages/activities.js"></script>

<script src="data/messages/stories.js"></script>





<!-- FUNKTIONER -->


<!-- Sparar historik och användarens val -->

<script src="js/storage.js"></script>



<!-- Skapar vänkort -->

<script src="js/friends.js"></script>



<!-- Hanterar chatten -->

<script src="js/chat.js"></script>



<!-- Skapar knappar och visuella element -->

<script src="js/ui.js"></script>



<!-- Startar hela sidan -->

<script src="js/app.js"></script>



</body>

</html>
